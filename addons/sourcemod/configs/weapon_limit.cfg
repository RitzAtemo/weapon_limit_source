// Weapon Kill Limit Configuration
// Format: "weapon_name" { "limit" "N" }
// Limit = max number of rounds where player can get kills with this weapon
// Once reached — weapon is stripped and blocked from buying
//
// All weapons set to limit 1 — one round with a kill = weapon blocked

