    "awp"     { "limit" "1" }
    "scout"   { "limit" "1" }
    "g3sg1"   { "limit" "1" }
    "sg550"   { "limit" "1" }
    "ak47"    { "limit" "1" }
    "m4a1"    { "limit" "1" }
    "aug"     { "limit" "1" }
    "sg552"   { "limit" "1" }
    "famas"   { "limit" "1" }
    "galil"   { "limit" "1" }

    // SMG
